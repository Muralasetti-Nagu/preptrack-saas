version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo_db
    ports:
      - "27017:27017"

  backend:
    build: ./server
    container_name: backend_app
    ports:
      - "5000:5000"
    environment:
    - MONGO_URI=${MONGO_URI}
    - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo

  frontend:
    build: ./client
    container_name: frontend_app
    ports:
      - "5173:5173"
    depends_on:
      - backend